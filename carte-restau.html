<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte table — Le Rive Gauche</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0b09; --bg2:#110f0c;
  --gold:#b8975a; --gold-l:#d4b07a; --gold-d:#8a6e3e;
  --cream:#f0ece4; --dim:#7a7260; --dim2:#4a4640;
}
@page{size:A5 portrait;margin:0;}
html{
  width:148mm;height:210mm;
  background:var(--bg);
  print-color-adjust:exact;
  -webkit-print-color-adjust:exact;
}
body{
  font-family:'Inter',sans-serif;
  color:var(--cream);
  width:148mm;height:210mm;
  position:relative;
  overflow:hidden;
  background:var(--bg);
  /* Diagonales très subtiles */
  background-image:
    repeating-linear-gradient(
      45deg,
      rgba(184,151,90,0.025) 0px,
      rgba(184,151,90,0.025) 1px,
      transparent 1px,
      transparent 9px
    );
}
 
/* ── Médaillon Art Déco background ── */
.medallion{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:180mm;height:180mm;
  opacity:0.065;
  pointer-events:none;
  z-index:0;
}
 
/* ── Cadres ── */
.frame-a{position:absolute;inset:5mm;border:1px solid var(--gold);z-index:1;pointer-events:none;}
.frame-b{position:absolute;inset:7.2mm;border:0.4px solid rgba(184,151,90,0.35);z-index:1;pointer-events:none;}
 
/* Coins renforcés */
.frame-a::before,.frame-a::after,.frame-b::before{content:'';position:absolute;}
.frame-a::before{
  top:-1px;left:-1px;right:-1px;bottom:-1px;
  border:2px solid transparent;
  border-image:linear-gradient(45deg,var(--gold) 0%,transparent 25%,transparent 75%,var(--gold) 100%) 1;
}
 
/* Diamants milieu de chaque côté du cadre extérieur */
.mid-diamond{
  position:absolute;
  width:9px;height:9px;
  background:var(--bg);
  border:1px solid var(--gold);
  transform:rotate(45deg);
  z-index:2;
}
.md-top   {top:4.5mm;left:50%;margin-left:-4.5px;}
.md-bottom{bottom:4.5mm;left:50%;margin-left:-4.5px;}
.md-left  {left:4.5mm;top:50%;margin-top:-4.5px;}
.md-right {right:4.5mm;top:50%;margin-top:-4.5px;}
 
/* ── Contenu ── */
.poster{
  position:relative;z-index:3;
  width:148mm;height:210mm;
  padding:13mm 14mm 11mm;
  display:flex;flex-direction:column;align-items:center;
  gap:0;
}
 
/* ── Bloc titre ── */
.top-orn{width:100%;flex-shrink:0;margin-bottom:3.5mm;}
.restaurant-name{
  font-family:'Cormorant Garamond',serif;
  font-size:22pt;font-weight:500;
  letter-spacing:0.3em;text-transform:uppercase;
  color:var(--cream);text-align:center;line-height:1;
  margin-bottom:1.5mm;flex-shrink:0;
}
.tagline{
  font-family:'Cormorant Garamond',serif;
  font-size:9.5pt;font-style:italic;font-weight:300;
  letter-spacing:0.1em;color:var(--gold);
  text-align:center;margin-bottom:3.5mm;flex-shrink:0;
}
.major-div{width:100%;flex-shrink:0;margin-bottom:4mm;}
 
/* ── Headline ── */
.headline{text-align:center;flex-shrink:0;margin-bottom:3mm;}
.headline-a{
  font-family:'Cormorant Garamond',serif;
  font-size:25pt;font-weight:300;letter-spacing:0.02em;
  color:var(--gold-l);line-height:1;display:block;
}
.headline-b{
  font-family:'Cormorant Garamond',serif;
  font-size:25pt;font-weight:300;letter-spacing:0.02em;
  color:var(--cream);line-height:1.05;display:block;
}
.headline-c{
  font-family:'Cormorant Garamond',serif;
  font-size:18pt;font-weight:300;font-style:italic;
  letter-spacing:0.04em;color:var(--dim);
  line-height:1.1;display:block;margin-top:1mm;
}
 
/* ── Citation ── */
.quote-section{
  flex-shrink:0;
  border-left:1.5px solid var(--gold-d);
  padding:2.5mm 3.5mm;
  margin:2mm 2mm 2mm;
  text-align:left;
  width:100%;
}
.quote-text{
  font-family:'Cormorant Garamond',serif;
  font-size:8.5pt;font-style:italic;font-weight:300;
  color:var(--dim);line-height:1.6;
  letter-spacing:0.02em;
}
.quote-author{
  font-size:6.5pt;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--gold-d);margin-top:1mm;font-weight:400;
}
 
/* ── Catégories ── */
.cats{
  flex-shrink:0;
  width:100%;
  padding:2.5mm 0;
  display:flex;align-items:center;justify-content:center;
  gap:0;flex-wrap:wrap;
  border-top:0.5px solid var(--dim2);
  border-bottom:0.5px solid var(--dim2);
  margin-bottom:3.5mm;
}
.cat{
  font-size:6pt;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--dim);padding:0 3mm;font-weight:400;
}
.cat-sep{
  width:1px;height:12px;
  background:var(--dim2);flex-shrink:0;
}
 
/* ── Zone QR ── */
.qr-area{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;gap:2mm;
  margin-bottom:3mm;
}
.qr-label-top{
  font-size:6pt;letter-spacing:0.28em;text-transform:uppercase;
  color:var(--gold);font-weight:400;
}
.qr-outer-frame{
  padding:4px;
  border:1px solid var(--gold);
  position:relative;
}
.qr-outer-frame::before{
  content:'';position:absolute;inset:3px;
  border:0.4px solid rgba(184,151,90,0.4);
}
/* Coins ornementaux du cadre QR */
.qr-outer-frame .qc{
  position:absolute;width:10px;height:10px;
}
.qc-tl{top:-2px;left:-2px;border-top:2px solid var(--gold-l);border-left:2px solid var(--gold-l);}
.qc-tr{top:-2px;right:-2px;border-top:2px solid var(--gold-l);border-right:2px solid var(--gold-l);}
.qc-bl{bottom:-2px;left:-2px;border-bottom:2px solid var(--gold-l);border-left:2px solid var(--gold-l);}
.qc-br{bottom:-2px;right:-2px;border-bottom:2px solid var(--gold-l);border-right:2px solid var(--gold-l);}
 
.qr-box{
  width:44mm;height:44mm;
  background:rgba(255,255,255,0.03);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
}
.qr-inner-label{
  display:flex;flex-direction:column;align-items:center;gap:2mm;
  opacity:0.35;
}
.qr-inner-label span{
  font-size:5pt;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--gold);display:block;
}
.qr-sub{
  font-size:6.5pt;letter-spacing:0.08em;color:var(--dim);text-align:center;
}
.qr-free{
  font-size:5.5pt;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--gold-d);text-align:center;
}
 
/* ── Bas ── */
.bottom{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  width:100%;gap:2.5mm;
}
.closing{
  font-family:'Cormorant Garamond',serif;
  font-size:11pt;font-style:italic;font-weight:300;
  color:var(--dim);letter-spacing:0.06em;
}
.bottom-orn{width:100%;}
 
@media screen{
  html{width:148mm;background:#555;display:flex;justify-content:center;padding:2rem 0;min-height:100vh;}
  body{box-shadow:0 8px 48px rgba(0,0,0,0.6);}
}
@media print{
  html,body{width:148mm;height:210mm;}
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>
 
<!-- Médaillon de fond -->
<svg class="medallion" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="96" fill="none" stroke="#b8975a" stroke-width="0.5"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#b8975a" stroke-width="0.4"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="#b8975a" stroke-width="0.4"/>

  <line x1="100" y1="72" x2="100" y2="4"   stroke="#b8975a" stroke-width="0.35"/>

</svg>
 
<!-- Cadres -->
<div class="frame-a">

  <div class="mid-diamond md-bottom"></div>

    <line x1="205" y1="18" x2="350" y2="18" stroke="#b8975a" stroke-width="0.25" opacity="0.5"/>
    <polygon points="180,4 194,14 180,24 166,14" fill="none" stroke="#b8975a" stroke-width="0.9"/>

  </svg>
 
  <div class="restaurant-name">Le Rive Gauche</div>

  <!-- Grand séparateur -->

    <line x1="0" y1="10" x2="360" y2="10" stroke="#2a2824" stroke-width="0.6"/>

  <!-- Titre -->
  <div class="headline">

  </div>
 
 <!-- Grand séparateur -->
  <svg class="major-div" viewBox="0 0 360 20" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="10" x2="360" y2="10" stroke="#2a2824" stroke-width="0.6"/>
